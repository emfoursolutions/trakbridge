# Queue Management Configuration - Phase 3 Implementation
# TrakBridge v1.0.0-rc.5 Queue Specification

# Core Queue Configuration
queue:
  max_size: 500                    # Maximum events per queue
  batch_size: 8                    # Events per transmission batch  
  overflow_strategy: "drop_oldest" # drop_oldest, drop_newest, block
  flush_on_config_change: true     # Immediate flush vs gradual drain

# Transmission Configuration
transmission:
  batch_timeout_ms: 100           # Max wait time to fill batch
  queue_check_interval_ms: 50     # How often to check for new events

# Monitoring Configuration  
monitoring:
  log_queue_stats: true           # Enable queue size logging
  queue_warning_threshold: 400    # Log warning when queue exceeds this
  monitoring_interval_seconds: 10 # How often to collect metrics
  metrics_retention_hours: 24     # How long to keep historical metrics
  
  # Health thresholds for alerting
  health_thresholds:
    utilization_warning: 80       # Queue utilization warning threshold (%)
    utilization_critical: 95      # Queue utilization critical threshold (%)
    overflow_rate_warning: 0.01   # 1% overflow rate warning
    overflow_rate_critical: 0.05  # 5% overflow rate critical
    wait_time_warning: 1.0        # 1 second wait time warning
    wait_time_critical: 5.0       # 5 seconds wait time critical

  # Trend analysis configuration
  trend_analysis:
    enabled: true                 # Enable trend analysis
    sample_points: 6              # Number of samples for trend analysis
    significant_change_percent: 20 # Threshold for significant change

  # Alerting configuration
  alerting:
    enabled: true                 # Enable alerting
    cooldown_minutes: 15          # Cooldown between similar alerts
    max_alerts_per_hour: 10       # Maximum alerts per hour

# Performance Optimization Configuration
performance:
  # Optimization strategy
  strategy:
    adaptive_batching: true       # Enable adaptive batch sizing
    memory_optimization: true     # Enable memory optimization
    load_balancing: true          # Enable load balancing
    prefetching_enabled: true     # Enable prefetching
    cache_optimization: true      # Enable cache optimization
    target_cpu_threshold: 70.0    # Target CPU usage threshold (%)
    target_memory_threshold_mb: 1024.0 # Target memory threshold (MB)
    min_batch_size: 1             # Minimum batch size
    max_batch_size: 50            # Maximum batch size
    optimization_interval_seconds: 30 # Optimization cycle interval

  # Validation configuration
  validation:
    enable_regression_detection: true # Enable performance regression detection
    enable_test_compliance_checks: true # Enable test compliance validation
    performance_baseline_samples: 10 # Number of baseline samples

  # Advanced optimization features
  advanced:
    enable_predictive_scaling: true # Enable predictive scaling
    enable_memory_pooling: true    # Enable memory pooling
    enable_network_optimization: true # Enable network optimization

# Environment-specific overrides
environments:
  development:
    queue:
      max_size: 100               # Smaller queues for development
      batch_size: 5               # Smaller batches for development
    monitoring:
      monitoring_interval_seconds: 5 # More frequent monitoring in dev
    performance:
      strategy:
        optimization_interval_seconds: 15 # More frequent optimization in dev

  staging:
    queue:
      max_size: 300               # Medium-sized queues for staging
      batch_size: 6               # Medium batches for staging
    monitoring:
      metrics_retention_hours: 12  # Shorter retention in staging

  production:
    queue:
      max_size: 500               # Full-sized queues for production
      batch_size: 8               # Optimal batches for production
    monitoring:
      metrics_retention_hours: 48  # Longer retention in production
    performance:
      strategy:
        target_cpu_threshold: 80.0 # Higher CPU threshold in production
        target_memory_threshold_mb: 2048.0 # Higher memory threshold